sonar.projectKey=khairulrsli_ransomware_detection
sonar.organization=khairulrsli

sonar.projectName=Ransomware Detection
sonar.projectVersion=1.0

sonar.sources=app,scripts
sonar.tests=tests
sonar.language=py
sonar.python.version=3.10

sonar.sourceEncoding=UTF-8

# Exclude generated/vendor files
sonar.exclusions=**/venv/**,**/.venv/**,**/env/**,**/__pycache__/**,**/reports/**,**/*.pyc

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml
